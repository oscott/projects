<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- Mobile + PWA config -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">

  <link rel="manifest" href="./manifest.json">

  <title>Strobe</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
    }

    #start {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      background: black;
    }
  </style>
</head>

<body>

<div id="start">Tap to begin</div>

<script>
// ==========================
// SERVICE WORKER
// ==========================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/strobe/sw.js')
    .then(() => console.log("Service worker registered"))
    .catch(err => console.log("SW failed:", err));
}

// ==========================
// WAKE LOCK (ANDROID)
// ==========================
let wakeLock = null;

async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log("Wake lock active");
  } catch (e) {
    console.log("Wake lock failed:", e);
  }
}

// ==========================
// STROBE ENGINE (stable + drift)
// ==========================
let state = 0;
let last = 0;

let baseFreq = 6;
let driftAmount = 1.5;
let driftSpeed = 4000;

function loop(t) {
  let drift = Math.sin(t / driftSpeed) * driftAmount;
  let freq = baseFreq + drift;

  let interval = 1000 / (freq * 2);

  if (t - last > interval) {
    state ^= 1;
    document.body.style.background = state ? "#fff" : "#000";
    last = t;
  }

  requestAnimationFrame(loop);
}

// ==========================
// START HANDLER (SAFE)
// ==========================
document.getElementById("start").onclick = async () => {

  // Try wake lock (won't break if it fails)
  await keepAwake();

  // Hide overlay
  document.getElementById("start").style.display = "none";

  // Start strobe
  requestAnimationFrame(loop);
};

</script>

</body>
</html>
