<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Strobe Meditation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="./manifest.json">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}
#strobe {
  position:fixed;
  inset:0;
  background:black;
}
#start {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  color:white;
  background:black;
  z-index:1000;
}
#freq-display {
  position:fixed;
  top:5px;
  right:5px;
  color:lime;
  font-size:14px;
  z-index:1001;
  font-family:monospace;
}
</style>
</head>

<body>
<div id="strobe"></div>
<div id="start">Tap to begin</div>
<div id="freq-display">-- Hz</div>

<script>
// ----------------------------
// SERVICE WORKER
// ----------------------------
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/strobe/sw.js')
    .then(() => console.log('Service worker registered'))
    .catch(e => console.log('SW failed:', e));
}

// ----------------------------
// WAKE LOCK (Android)
// ----------------------------
let wakeLock = null;
async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log("Wake lock active");
  } catch (e) {
    console.log("Wake lock failed:", e);
  }
}

// ----------------------------
// DYNAMIC STROBE SETTINGS
// ----------------------------
let state = false;
let lastTime = 0;

const minFreq = 6;      // Hz
const maxFreq = 11;     // Hz
const cycleDuration = 30000; // 30s full cycle

let strobeDiv = document.getElementById('strobe');
let freqDisplay = document.getElementById('freq-display');
let startBtn = document.getElementById('start');

function strobeLoop(timestamp) {
  const normalized = (timestamp % cycleDuration) / cycleDuration;
  const freq = minFreq + (maxFreq - minFreq) * (0.5 + 0.5 * Math.sin(normalized * 2 * Math.PI));

  freqDisplay.textContent = freq.toFixed(1) + " Hz";

  const interval = 1000 / (freq * 2);

  if (timestamp - lastTime > interval) {
    state = !state;
    strobeDiv.style.background = state ? "#fff" : "#000";
    lastTime = timestamp;
  }

  requestAnimationFrame(strobeLoop);
}

// ----------------------------
// TAP TO START
// ----------------------------
startBtn.addEventListener('click', async () => {
  await keepAwake();
  startBtn.style.display = 'none';
  requestAnimationFrame(strobeLoop);
});
</script>

</body>
</html>
