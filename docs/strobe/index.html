<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Strobe Meditation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="./manifest.json">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}
#start {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  color:white;
  background:black;
}
</style>
</head>

<body>
<div id="start">Tap to begin</div>

<script>
// ----------------------------
// SERVICE WORKER
// ----------------------------
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/strobe/sw.js')
    .then(() => console.log('Service worker registered'))
    .catch(e => console.log('SW failed:', e));
}

// ----------------------------
// WAKE LOCK (Android)
// ----------------------------
let wakeLock = null;
async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log("Wake lock active");
  } catch (e) {
    console.log("Wake lock failed:", e);
  }
}

// ----------------------------
// STROBE SETTINGS
// ----------------------------
let state = 0;
let lastTime = 0;

const minFreq = 6;   // Hz
const maxFreq = 11;  // Hz
const cycleDuration = 30000; // 30s full cycle

function strobeLoop(timestamp) {
  // Time-based sine fluctuation 6-11 Hz
  const normalized = (timestamp % cycleDuration) / cycleDuration;
  const freq = minFreq + (maxFreq - minFreq) * (0.5 + 0.5 * Math.sin(normalized * 2 * Math.PI));
  const interval = 1000 / (freq * 2);

  if (timestamp - lastTime > interval) {
    state ^= 1;
    document.body.style.background = state ? "#fff" : "#000";
    lastTime = timestamp;
  }

  requestAnimationFrame(strobeLoop);
}

// ----------------------------
// START BUTTON HANDLER
// ----------------------------
document.getElementById('start').addEventListener('click', async () => {
  await keepAwake(); // wake lock
  document.getElementById('start').style.display = 'none'; // hide overlay
  requestAnimationFrame(strobeLoop); // start strobe
});
</script>
</body>
</html>
