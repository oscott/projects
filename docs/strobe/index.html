<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strobe Meditation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">

  <link rel="manifest" href="./manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #start {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
      background: black;
    }
  </style>
</head>

<body>

<div id="start">Tap to begin</div>

<script>
// ==========================
// SERVICE WORKER
// ==========================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/strobe/sw.js')
    .then(() => console.log("Service worker registered"))
    .catch(err => console.log("SW failed:", err));
}

// ==========================
// WAKE LOCK (ANDROID)
// ==========================
let wakeLock = null;
async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log("Wake lock active");
  } catch (e) {
    console.log("Wake lock failed:", e);
  }
}

// ==========================
// DYNAMIC STROBE ENGINE
// ==========================
let state = 0;
let last = 0;

// Frequency fluctuation settings
let minFreq = 6;          // Hz
let maxFreq = 11;         // Hz
let cycleDuration = 30000; // 30 seconds per full fluctuation

function strobeLoop(t) {
  // Normalized progress through 30s cycle
  let normalized = (t % cycleDuration) / cycleDuration;

  // Sine wave fluctuation between minFreq and maxFreq
  let freq = minFreq + (maxFreq - minFreq) * (0.5 + 0.5 * Math.sin(normalized * 2 * Math.PI));

  let interval = 1000 / (freq * 2); // half-cycle

  if (t - last > interval) {
    state ^= 1;
    document.body.style.background = state ? "#fff" : "#000";
    last = t;
  }

  requestAnimationFrame(strobeLoop);
}

// ==========================
// START HANDLER
// ==========================
document.getElementById("start").onclick = async () => {
  await keepAwake();                  // Attempt wake lock
  document.getElementById("start").style.display = "none"; // Hide overlay
  requestAnimationFrame(strobeLoop);  // Start strobe
};
</script>

</body>
</html>
