<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Strobe Debug</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="./manifest.json">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}
#start {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  color:white;
  background:black;
}
#freq-display {
  position:fixed;
  top:5px;
  right:5px;
  color:lime;
  font-size:14px;
  z-index:1000;
  font-family:monospace;
}
</style>
</head>

<body>
<div id="start">Tap to begin</div>
<div id="freq-display">-- Hz</div>

<script>
let state = 0;
let lastTime = 0;
let freqDisplay = document.getElementById('freq-display');

const minFreq = 6;       // Hz
const maxFreq = 11;      // Hz
const cycleDuration = 30000; // 30s

function strobeLoop(timestamp) {
  // Normalized cycle [0,1]
  const normalized = (timestamp % cycleDuration) / cycleDuration;

  // Current frequency
  const freq = minFreq + (maxFreq - minFreq) * (0.5 + 0.5 * Math.sin(normalized * 2 * Math.PI));

  // Update corner display
  freqDisplay.textContent = freq.toFixed(1) + " Hz";

  // Toggle interval (half-cycle)
  const interval = 1000 / (freq * 2);

  if (timestamp - lastTime > interval) {
    state ^= 1;
    document.body.style.background = state ? "#fff" : "#000";
    lastTime = timestamp;
  }

  requestAnimationFrame(strobeLoop);
}

// Tap-to-start
document.getElementById('start').addEventListener('click', () => {
  document.getElementById('start').style.display = 'none';
  requestAnimationFrame(strobeLoop);
});
</script>

</body>
</html>
