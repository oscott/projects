<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <title>Strobe Meditation</title>
</head>

<body style="margin:0; background:black;">
<script>
let wakeLock = null;

async function keepScreenAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('Wake lock active');

    // Re-acquire if lost (e.g. switching tabs)
    wakeLock.addEventListener('release', () => {
      console.log('Wake lock released');
    });

  } catch (err) {
    console.log('Wake lock failed:', err);
  }
}

// Must be triggered by user interaction on many devices
document.addEventListener('click', keepScreenAwake);
</script>
<script>
// ===============================
// USER SETTINGS
// ===============================

// Base frequency in Hz (flashes per second)
let baseFrequency = 6;

// How much the frequency drifts (+/- this value)
let driftAmount = 1.5;

// How fast the drift happens (larger = slower changes)
let driftSpeed = 4000;


// ===============================
// INTERNAL STATE
// ===============================

// Current background state (0 = black, 1 = white)
let state = 0;

// Last time we flipped (ms timestamp)
let lastToggleTime = 0;


// ===============================
// MAIN LOOP (runs every frame)
// ===============================

function animate(currentTime) {

  // Calculate a gently drifting frequency using a sine wave
  let drift = Math.sin(currentTime / driftSpeed) * driftAmount;

  // Final frequency = base + drift
  let frequency = baseFrequency + drift;

  // Convert frequency → time per half-cycle (on/off)
  let interval = 1000 / (frequency * 2);

  // If enough time has passed, flip the screen
  if (currentTime - lastToggleTime > interval) {
    
    // Toggle between 0 and 1
    state = state ^ 1;

    // Apply color
    document.body.style.background = state ? "white" : "black";

    // Update last toggle time
    lastToggleTime = currentTime;
  }

  // Keep looping
  requestAnimationFrame(animate);
}

// Start the loop
requestAnimationFrame(animate);
  
</script>
<div id="start" style="
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-size:24px;
">
  Tap to begin
</div>

<script>
document.getElementById("start").onclick = async () => {
  document.getElementById("start").style.display = "none";
  await keepScreenAwake();
};
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
  
</script>
</body>
</html>
