<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strobe Tester</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
    }
    #strobe-area {
      width: 100%;
      height: 70%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #controls {
      width: 90%;
      margin-top: 10px;
      text-align: center;
    }
    input[type=range] {
      width: 80%;
    }
  </style>
</head>
<body>

<div id="strobe-area"></div>

<div id="controls">
  <label>Frequency: <span id="freq-display">6</span> Hz</label><br>
  <input type="range" id="freq-slider" min="1" max="20" step="0.1" value="6">
</div>

<script>
let strobeArea = document.getElementById("strobe-area");
let freqSlider = document.getElementById("freq-slider");
let freqDisplay = document.getElementById("freq-display");

let baseFreq = parseFloat(freqSlider.value);
let state = 0;
let last = 0;

// Optional gentle drift
let driftAmount = 0.5;
let driftSpeed = 4000;

freqSlider.oninput = () => {
  baseFreq = parseFloat(freqSlider.value);
  freqDisplay.textContent = baseFreq.toFixed(1);
};

function loop(t) {
  let drift = Math.sin(t / driftSpeed) * driftAmount;
  let freq = baseFreq + drift;

  let interval = 1000 / (freq * 2); // half-cycle

  if (t - last > interval) {
    state ^= 1;
    strobeArea.style.background = state ? "#fff" : "#000";
    last = t;
  }

  requestAnimationFrame(loop);
}

// Start the strobe loop
requestAnimationFrame(loop);
</script>

</body>
</html>
